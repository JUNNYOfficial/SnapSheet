name: Build and Release Desktop App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build Electron app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:electron:ci
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release create "$RELEASE_TAG" \
            --title "SnapSheet $RELEASE_TAG" \
            --notes "桌面端全平台构建" \
            release/*.dmg || true

  release-windows:
    runs-on: windows-latest
    needs: release-macos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build Electron app
        run: npm run build:electron:ci
      - name: Upload Windows build to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $exe = Get-ChildItem release\*.exe | Select-Object -First 1
          gh release upload "$tag" $exe.FullName --clobber

  release-linux:
    runs-on: ubuntu-latest
    needs: release-macos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build Electron app
        run: npm run build:electron:ci
      - name: Upload Linux build to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release upload "$RELEASE_TAG" release/*.AppImage --clobber
