name: Build and Release Desktop App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build Electron app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        # CI 使用已提交的 icon.icns/icon.png，跳过本地 iconutil 步骤
        run: npm run build:electron:ci
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "SnapSheet ${{ github.ref_name }}" \
            --notes "macOS desktop builds" \
            release/*.dmg
