  <line x1="238" y1="730" x2="786" y2="730" stroke="#0BAD4A" stroke-opacity="0.18" stroke-width="12"/>

  <!-- 列线 -->
  <line x1="418" y1="238" x2="418" y2="786" stroke="#0BAD4A" stroke-opacity="0.18" stroke-width="12"/>
  <line x1="598" y1="238" x2="598" y2="786" stroke="#0BAD4A" stroke-opacity="0.18" stroke-width="12"/>

